identity:
  name: external_knowledge_search
  author: anishrajoracle
  label:
    en_US: External Knowledge Search
description:
  human:
    en_US: Search text content stored in an Oracle AI Database table.
  llm: Search a configured table using Oracle Text CONTAINS or a LIKE fallback and return matching rows.
parameters:
  - name: query
    type: string
    required: true
    form: llm
    label:
      en_US: Query
  - name: table_name
    type: string
    required: true
    form: form
    label:
      en_US: Table Name
  - name: text_column
    type: string
    required: false
    form: form
    default: text
    label:
      en_US: Text Column
  - name: id_column
    type: string
    required: false
    form: form
    default: id
    label:
      en_US: ID Column
  - name: metadata_columns
    type: string
    required: false
    form: form
    label:
      en_US: Metadata Columns
    human_description:
      en_US: Optional comma-separated column names to return.
  - name: use_oracle_text
    type: boolean
    required: false
    form: form
    default: true
    label:
      en_US: Use Oracle Text
  - name: max_rows
    type: number
    required: false
    form: form
    default: 10
    min: 1
    max: 100
    label:
      en_US: Max Rows
extra:
  python:
    source: tools/external_knowledge_search.py
