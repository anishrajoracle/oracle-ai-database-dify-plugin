identity:
  author: anishrajoracle
  name: oracle
  label:
    en_US: Guarded Oracle Retrieval and Actions
  description:
    en_US: Bounded SQL actions, Oracle Text, vector, and hybrid retrieval for Oracle Database.
  icon: icon.svg
  tags:
    - productivity
    - utilities
credentials_for_provider:
  user:
    type: text-input
    required: true
    label:
      en_US: User
    placeholder:
      en_US: app_user
  password:
    type: secret-input
    required: true
    label:
      en_US: Password
  dsn:
    type: text-input
    required: false
    label:
      en_US: DSN
    placeholder:
      en_US: dbhost.example.com:1521/FREEPDB1
    help:
      en_US: Use this when you already have a complete Oracle DSN. If omitted, host, port, and service name are used.
  host:
    type: text-input
    required: false
    label:
      en_US: Host
    placeholder:
      en_US: localhost
  port:
    type: text-input
    required: false
    label:
      en_US: Port
    placeholder:
      en_US: "1521"
  service_name:
    type: text-input
    required: false
    label:
      en_US: Service Name
    placeholder:
      en_US: FREEPDB1
  config_dir:
    type: text-input
    required: false
    label:
      en_US: Wallet Config Directory
    help:
      en_US: Directory inside a self-hosted plugin runtime containing tnsnames.ora or sqlnet.ora.
  wallet_location:
    type: text-input
    required: false
    label:
      en_US: Wallet Location
    help:
      en_US: Wallet directory mounted inside a self-hosted plugin runtime. Wallet upload is not supported.
  wallet_password:
    type: secret-input
    required: false
    label:
      en_US: Wallet Password
    help:
      en_US: Password for the configured wallet, when required.
  enable_writes:
    type: boolean
    required: false
    default: false
    label:
      en_US: Enable Write Actions
    help:
      en_US: Allow configured write tools to persist database changes. Leave disabled for retrieval-only authorizations.
tools:
  - tools/read_only_sql.yaml
  - tools/write_only_sql.yaml
  - tools/external_knowledge_search.yaml
  - tools/external_vector_search.yaml
  - tools/hybrid_knowledge_search.yaml
extra:
  python:
    source: provider/oracle.py
