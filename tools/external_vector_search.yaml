identity:
  name: external_vector_search
  author: anishrajoracle
  label:
    en_US: External Vector Search
description:
  human:
    en_US: Search existing Oracle VECTOR rows using cosine vector similarity.
  llm: Search a configured Oracle table with VECTOR_DISTANCE over a VECTOR column and return nearest rows.
parameters:
  - name: query_vector
    type: string
    required: true
    form: llm
    label:
      en_US: Query Vector JSON
    human_description:
      en_US: JSON array of numeric embedding values to search with.
    llm_description: JSON array of numeric embedding values, for example [0.1, 0.2, 0.3].
  - name: table_name
    type: string
    required: true
    form: form
    label:
      en_US: Table Name
    human_description:
      en_US: Oracle table containing existing VECTOR rows.
  - name: vector_column
    type: string
    required: false
    form: form
    default: embedding
    label:
      en_US: Vector Column
    human_description:
      en_US: VECTOR column used for similarity search.
  - name: content_column
    type: string
    required: false
    form: form
    default: text
    label:
      en_US: Content Column
    human_description:
      en_US: Text/content column to return with each vector match.
  - name: id_column
    type: string
    required: false
    form: form
    default: id
    label:
      en_US: ID Column
    human_description:
      en_US: Identifier column to return with each result.
  - name: metadata_columns
    type: string
    required: false
    form: form
    label:
      en_US: Metadata Columns
    human_description:
      en_US: Optional comma-separated column names to return.
  - name: max_rows
    type: number
    required: false
    form: form
    default: 10
    min: 1
    max: 100
    label:
      en_US: Max Rows
    human_description:
      en_US: Maximum number of vector matches to return.
extra:
  python:
    source: tools/external_vector_search.py
