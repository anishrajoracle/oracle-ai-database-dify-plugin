identity:
  name: nl2sql_query
  author: anishrajoracle
  label:
    en_US: NL to SQL
description:
  human:
    en_US: Generate Oracle SQL from natural language with Select AI.
  llm: Generate SQL using Oracle Select AI and optionally execute it after read-only validation.
parameters:
  - name: question
    type: string
    required: true
    form: llm
    label:
      en_US: Question
    human_description:
      en_US: Natural-language question to convert into Oracle SQL.
    llm_description: Natural-language question to convert into Oracle SQL.
  - name: profile_name
    type: string
    required: true
    form: form
    label:
      en_US: Select AI Profile
    human_description:
      en_US: Oracle Select AI profile name configured in the database.
  - name: execute
    type: boolean
    required: false
    form: form
    default: false
    label:
      en_US: Execute Generated SQL
    human_description:
      en_US: Execute generated SQL after read-only validation.
  - name: max_rows
    type: number
    required: false
    form: form
    default: 100
    min: 1
    max: 1000
    label:
      en_US: Max Rows
    human_description:
      en_US: Maximum number of rows to return if execution is enabled.
extra:
  python:
    source: tools/nl2sql_query.py
